    <style>

            color: #FFFFFF;
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            padding: 20px;

        h1 {
            font-family: 'Montserrat', sans-serif;
            color: #1DB954;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .chart-container {
            background-color: #191414;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .full-width {
            grid-column: span 2;
        }
        .kpi-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }
        .kpi-card {
            background-color: #191414;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            width: 200px;
            border: 1px solid #1DB954;
        }
        .kpi-value {
            font-size: 32px;
            font-weight: bold;
            color: #1DB954;
        }
        .kpi-label {
            font-size: 14px;
            color: #B3B3B3;
            text-transform: uppercase;
        }
    </style>
</head>
