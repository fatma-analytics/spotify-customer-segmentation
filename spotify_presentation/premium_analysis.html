<!DOCTYPE html>
<html lang="fr">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <style>
      /* Remove default body margin to avoid the 8px overflow */
      body { margin: 0; }
      .slide-container { 
        width: 1280px; 
        min-height: 720px; 
        background: #121212; 
        color: #FFFFFF; 
        font-family: 'Open Sans', sans-serif;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }
      .header {
        padding-top: 60px;
        padding-left: 80px;
        margin-bottom: 32px; /* slightly reduced from 40 to improve spacing without touching title top padding */
      }
      h1 {
        font-family: 'Montserrat', sans-serif;
        font-size: 48px;
        color: #1DB954;
        text-transform: uppercase;
      }
      .content-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        padding-left: 80px;
        padding-right: 80px;
      }
      .chart-container {
        height: 392px; /* slightly reduced from 400 to help ensure no overflow */
        background: rgba(255, 255, 255, 0.05);
        padding-top: 16px;
        padding-left: 20px;
        padding-right: 20px;
      }
      .insights-list {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .insight-card {
        margin-bottom: 26px; /* slightly reduced from 30 */
        display: flex;
        align-items: center;
      }
      .insight-icon {
        font-size: 32px;
        color: #1DB954;
        margin-right: 20px;
        width: 50px;
        text-align: center;
      }
      .insight-text {
        font-size: 22px;
        line-height: 1.4;
      }
      .insight-text b {
        color: #1DB954;
      }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1>Analyse des Abonnements Premium</h1>
        </div>
        <div class="content-grid">
            <div class="chart-section">
                <div class="chart-container">
                    <canvas id="premiumChart"></canvas>
                </div>
            </div>
            <div class="insights-list">
                <div class="insight-card">
                    <div class="insight-icon"><i class="fas fa-chart-pie"></i></div>
                    <div class="insight-text">Taux de conversion maximal chez les <b>20-35 ans</b> (Millennials).</div>
                </div>
                <div class="insight-card">
                    <div class="insight-icon"><i class="fas fa-clock"></i></div>
                    <div class="insight-text">L'usage Premium est corrélé à une <b>écoute quotidienne</b> intensive.</div>
                </div>
                <div class="insight-card">
                    <div class="insight-icon"><i class="fas fa-user-graduate"></i></div>
                    <div class="insight-text">Les utilisateurs <b>Free</b> sont majoritairement dans le segment 12-20 ans.</div>
                </div>
                <div class="insight-card">
                    <div class="insight-icon"><i class="fas fa-lightbulb"></i></div>
                    <div class="insight-text">Opportunité majeure : Offres <b>étudiantes</b> pour capter la Gen Z.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('premiumChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['12-20', '20-35', '35-60', '60+'],
                datasets: [{
                    label: '% Utilisateurs Premium',
                    data: [35, 72, 58, 45],
                    backgroundColor: '#1DB954',
                    borderColor: '#1DB954',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: { color: '#FFFFFF', font: { family: 'Open Sans', size: 14 } }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: '#B3B3B3' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#B3B3B3' }
                    }
                }
            }
        });
    </script>
</body>
</html>
